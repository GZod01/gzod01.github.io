<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptage</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.2/rollups/aes.js"></script>
</head>
<body>
    <a><input type="text" id="inputmessage"  placeholder="Message à coder">
    <input type="text" id="inputmdp" placeholder="Mot de Passe">
    <button id="encrsubmit" /*style="padding: 10px 24px; border-radius: 4px; background-color: #7487e2;*/">Soumettre le message à encoder</button>
    <button id="decrsubmit" /*style="padding: 10px 24px; border-radius: 4px; background-color: #7487e2;*/">Soumettre le message à décoder</button>
    <p id="message">message:</p>
    <script>
        var message=""
        var mdp=""
        var encrypt=CryptoJS.AES.encrypt().value;
        var decrypt=CryptoJS.AES.decrypt().value;
        function crypter(){
            var message= JSON.stringify(document.getElementById("inputmessage").value);
            var mdp= JSON.stringify(document.getElementById("inputmdp").value);
            var encrypted= encrypt(message,mdp);
            function write(){
                const text = document.getElementById('message');
                text.textContent = ("Le message encrypté est: \n" + encrypted);
            }
            write()
        }
        function decrypter(){
            message= document.getElementById("inputmessage").value;
            mdp= document.getElementById("inputmdp").value;
            var decrypted= decrypt(message,mdp);
            function write(){
                const text = document.getElementById('message');
                text.textContent = ("Le message décrypté est: \n" + decrypted);
            }
            write()
        }
        var objet= document.getElementById("encrsubmit");
        objet.addEventListener("click", crypter);
        var objet= document.getElementById("decrsubmit");
        objet.addEventListener("click", decrypter);

    </script>
</body>
</html>
