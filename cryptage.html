<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptage</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.2/rollups/aes.js"></script>
</head>
<body>
    <a><input type="text" id="inputmessage"  placeholder="Message à coder">
    <input type="text" id="inputmdp" placeholder="Mot de Passe">
    <button id="encrsubmit">Soumettre le message à encoder</button>
    <button id="decrsubmit">Soumettre le message à décoder</button>
    <label>Message:</label><br><br>
    <div id="message"></div>
    <script>
        function crypter(){
            var message= JSON.stringify(document.getElementById("inputmessage").value);
            console.log(message);
            var mdp= JSON.stringify(document.getElementById("inputmdp").value);
            console.log(mdp);
            var encrypted = CryptoJS.AES.encrypt(message, mdp);
            console.log(encrypted);
            var encryptedstring = encrypted.toString(CryptoJS.enc.Utf8);
            console.log(encryptedstring);
            document.getElementById("message").innerHTML = encrypted
        }
        function decrypter(){
            var message= document.getElementById("inputmessage").value;
            console.log(message);
            var mdp= document.getElementById("inputmdp").value;
            console.log(mdp);
            var decrypted = CryptoJS.AES.decrypt(message, mdp);
            console.log(decrypted);
            var decryptedstring = decrypted.toString(CryptoJS.enc.Utf8);
            console.log(decryptedstring);
            document.getElementById("message").innerHTML = decrypted
        }
        var objet= document.getElementById("encrsubmit");
        objet.addEventListener("click", crypter);
        var objet= document.getElementById("decrsubmit");
        objet.addEventListener("click", decrypter);

    </script>
</body>
</html>
