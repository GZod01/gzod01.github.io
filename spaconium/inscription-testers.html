<html>
  <head>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  </head>
  <body class="container mt-5">
    <form onsubmit="sendContact(event)">
      <div class="mb-3">
        <label for="emailInput" class="form-label">Entrez votre adresse email<p title="Obligatoire" style="color: red">*</p>;</label>
        <input type="email" class="form-control" id="emailInput">
      </div>
      <div class="mb-3">
        <label for="discordInput" class="form-label">Entrez votre username Discord (ex: username#0000)<p title="Obligatoire" style="color: red">*</p></label>
        <input type="text" class="form-control" id="discordInput">
      </div>
      <div class="mb-3">
        <label for="messageInput" class="form-label">Entrez votre texte de candidature<p title="Obligatoire" style="color: red">*</p></label>
        <textarea class="form-control" id="messageInput" rows="3"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    <script>
      async function sendContact(ev) {
        ev.preventDefault();

        const senderEmail = document
          .getElementById('emailInput').value;
        const senderMessage = document
          .getElementById('messageInput').value;
        const senderdiscord = document
          .getElementById('discordInput').value;

        const webhookBody = {
          embeds: [{
            title: 'Candidatures de testeur',
            fields: [
              { name: 'Email du candidat', value: senderEmail },
              { name: 'Discord du candidat', value: senderdiscord},
              { name: 'Message', value: senderMessage }
            ]
          }],
        };

        const webhookUrl = 'https://canary.discord.com/api/webhooks/1037419935208591440/JwATEE4z3bNRk2vYvnVfu1dT1hwNLey_5RV9sNVr2axcRXifHWoyo8S0Vw3kR_0w2VVw';

        const response = await fetch(webhookUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(webhookBody),
        });

        if (response.ok) {
          alert('I have received your message!');
        } else {
          alert('There was an error! Try again later!');
        }
      }
    </script>
  </body>
</html>
