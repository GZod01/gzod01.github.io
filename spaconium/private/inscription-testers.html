<html>
  <head>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.2/rollups/aes.js" integrity="sha256-/H4YS+7aYb9kJ5OKhFYPUjSJdrtV6AeyJOtTkw6X72o=" crossorigin="anonymous"></script>
  </head>
  <body class="container mt-5">
    <form onsubmit="sendContact(event)">
      <div class="mb-3">
        <label for="emailInput" class="form-label">Entrez votre adresse email<abbr title="Obligatoire" style="color: red">*</abbr></label>
        <input type="email" class="form-control" id="emailInput">
      </div>
      <div class="mb-3">
        <label for="discordInput" class="form-label">Entrez votre username Discord (ex: username#0000)<abbr title="Obligatoire" style="color: red">*</abbr></label>
        <input type="text" class="form-control" id="discordInput">
      </div>
      <div class="mb-3">
        <label for="messageInput" class="form-label">Entrez votre texte de candidature<abbr title="Obligatoire" style="color: red">*</abbr></label>
        <textarea class="form-control" id="messageInput" rows="3"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    <script>
      async function sendContact(ev) {
        ev.preventDefault();

        const senderEmail = document
          .getElementById('emailInput').value;
        const senderMessage = document
          .getElementById('messageInput').value;
        const senderdiscord = document
          .getElementById('discordInput').value;

        const webhookBody = {
          embeds: [{
            title: 'Candidatures de testeur',
            fields: [
              { name: 'Email du candidat', value: senderEmail },
              { name: 'Discord du candidat', value: senderdiscord},
              { name: 'Message', value: senderMessage }
            ]
          }],
        };

        var cryptedwebhookUrl = 'U2FsdGVkX1+OrQboEDZlmvtjvdiikmEq3sntEJjwtH26pV69zdUuX+4x03rAZ17gERXx2T0EW9sgmrEODMF3vVQEBRt3NwbsvNnNbF/5cym8ltpcYkanD52JQBaEa351cZPVXhTjtTsPEJSeSwwpq8dZRfYNaqfpIvckfej+85hHVY3JDKsN77jkpwkejPw4izksf8d5bxBOjMzeFC1Iug=='
        var decryptedwebhookUrl = CryptoJS.AES.decrypt(cryptedwebhookUrl,"spaconiummdp");
        const webhookUrl = decryptedwebhookUrl.toString(CryptoJS.enc.Utf8);

        const response = await fetch(webhookUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(webhookBody),
        });

        if (response.ok) {
          alert('Candidature envoyée avec succès');
        } else {
          alert('Il y a eu une erreur, rééssayez. Verifiez que vous avez bien complété toutes les cases.');
        }
      }
    </script>
  </body>
</html>
